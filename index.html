<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Shop Status Toggle</title>
    <style>
      :root {
        color-scheme: light;
        --bg: #eef1f4;
        --shell-top: #f7f9fb;
        --shell-bottom: #d9dee4;
        --thumb-top: #ffffff;
        --thumb-bottom: #edf1f5;
        --text-open: #0f8a3b;
        --text-close: #d62d20;
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        height: 100%;
      }

      body {
        margin: 0;
        display: grid;
        place-items: center;
        background:
          radial-gradient(circle at 50% 0%, rgba(255, 255, 255, 0.95), transparent 42%),
          var(--bg);
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        color: #111827;
      }

      .scene {
        width: min(92vw, 700px);
        display: grid;
        place-items: center;
        padding: clamp(20px, 4vw, 44px);
      }

      .toggle {
        position: relative;
        width: min(90vw, 620px);
        aspect-ratio: 3 / 1;
        border: 0;
        border-radius: 999px;
        background: linear-gradient(180deg, var(--shell-top), var(--shell-bottom));
        border: 1px solid rgba(17, 24, 39, 0.12);
        box-shadow:
          0 16px 30px rgba(15, 23, 42, 0.14),
          inset 0 1px 0 rgba(255, 255, 255, 0.8),
          inset 0 -1px 0 rgba(0, 0, 0, 0.05);
        padding: clamp(8px, 1.5vw, 12px);
        cursor: pointer;
        appearance: none;
        -webkit-tap-highlight-color: transparent;
        outline: none;
      }

      .toggle:focus-visible {
        box-shadow:
          0 16px 30px rgba(15, 23, 42, 0.14),
          inset 0 1px 0 rgba(255, 255, 255, 0.8),
          inset 0 -1px 0 rgba(0, 0, 0, 0.05),
          0 0 0 4px rgba(14, 165, 233, 0.2);
      }

      .track {
        position: relative;
        width: 100%;
        height: 100%;
        border-radius: inherit;
        background: linear-gradient(180deg, #fcfdff 0%, #eef2f6 100%);
        box-shadow: inset 0 1px 1px rgba(255, 255, 255, 0.8), inset 0 -1px 2px rgba(15, 23, 42, 0.08);
        overflow: hidden;
      }

      .thumb {
        position: absolute;
        inset: 7% auto 7% 7%;
        width: 46%;
        border-radius: 999px;
        background: linear-gradient(180deg, var(--thumb-top) 0%, var(--thumb-bottom) 100%);
        box-shadow:
          0 10px 18px rgba(15, 23, 42, 0.14),
          inset 0 1px 0 rgba(255, 255, 255, 0.95),
          inset 0 -1px 0 rgba(0, 0, 0, 0.05);
        transform: translateX(0);
        transition: transform 240ms cubic-bezier(0.2, 0.8, 0.2, 1), background 240ms ease;
      }

      .thumb::before {
        content: "";
        position: absolute;
        inset: 10% 12% auto 12%;
        height: 28%;
        border-radius: inherit;
        background: linear-gradient(180deg, rgba(255, 255, 255, 0.95), rgba(255, 255, 255, 0));
        opacity: 0.85;
      }

      .toggle[data-state="open"] .thumb {
        transform: translateX(100%);
      }

      .label {
        position: absolute;
        inset: 50% 0 auto 0;
        transform: translateY(-50%);
        display: none;
        place-items: center;
        font-weight: 700;
        letter-spacing: 0.1em;
        text-transform: uppercase;
        font-size: clamp(1.55rem, 4.7vw, 4rem);
        line-height: 1;
        pointer-events: none;
        user-select: none;
      }

      .label--open {
        color: var(--text-open);
        transform: translate(-18%, -50%) scale(1);
      }

      .label--close {
        color: var(--text-close);
        transform: translate(18%, -50%) scale(1);
      }

      .toggle[data-state="closed"] .label--close,
      .toggle[data-state="open"] .label--open {
        display: grid;
      }

      .toggle[data-state="closed"] .label--close {
        transform: translate(18%, -50%) scale(1);
      }

      .toggle[data-state="open"] .label--open {
        transform: translate(-18%, -50%) scale(1);
      }

      .sr-only {
        position: absolute;
        width: 1px;
        height: 1px;
        padding: 0;
        margin: -1px;
        overflow: hidden;
        clip: rect(0, 0, 0, 0);
        white-space: nowrap;
        border: 0;
      }

      @media (max-width: 720px) {
        .scene {
          width: 100%;
          padding-inline: 16px;
        }

        .toggle {
          width: min(100%, 560px);
        }

        .label {
          letter-spacing: 0.09em;
        }
      }

      @media (max-width: 520px) {
        .scene {
          padding-inline: 12px;
        }

        .toggle {
          width: 100%;
          aspect-ratio: 2.9 / 1;
          padding: 7px;
        }

        .label {
          font-size: clamp(1.25rem, 7vw, 2.5rem);
          letter-spacing: 0.06em;
        }

        .thumb {
          inset: 8% auto 8% 8%;
          width: 44%;
        }
      }

      @media (min-width: 1000px) {
        .scene {
          width: min(70vw, 820px);
        }

        .toggle {
          width: min(72vw, 700px);
        }

        .label {
          font-size: clamp(1.8rem, 4vw, 4.6rem);
        }
      }

      @media (prefers-reduced-motion: reduce) {
        .thumb {
          transition: none;
        }
      }
    </style>
  </head>
  <body>
    <main class="scene">
      <button class="toggle" id="statusToggle" type="button" aria-pressed="false" aria-label="Toggle shop status" data-state="closed">
        <span class="track" aria-hidden="true">
          <span class="thumb"></span>
          <span class="label label--open">OPEN</span>
          <span class="label label--close">CLOSE</span>
        </span>
        <span class="sr-only" id="statusText">Shop is closed</span>
      </button>
    </main>

    <script>
      const toggle = document.getElementById('statusToggle');
      const statusText = document.getElementById('statusText');

      function setState(isOpen) {
        toggle.dataset.state = isOpen ? 'open' : 'closed';
        toggle.setAttribute('aria-pressed', String(isOpen));
        statusText.textContent = isOpen ? 'Shop is open' : 'Shop is closed';
      }

      toggle.addEventListener('click', () => {
        setState(toggle.dataset.state !== 'open');
      });

      setState(false);
    </script>
  </body>
</html>
